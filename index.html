<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Affichage d'image</title>
    <style>
        /* CSS intégré pour rendre l'image adaptative */
        .image-adaptative {
            max-width: 100%;
            height: auto;
            display: block;
            margin: 0 auto; /* Pour centrer l'image horizontalement */
            border-radius: 8px; /* Optionnel : arrondit légèrement les coins */
        }
        
        body {
            font-family: sans-serif;
            padding: 20px;
        }
    </style>
</head>
<body>

    <img src="0535122411ebccad50a0de5d6fec7bc0.jpg" alt="gorille" class="image-adaptative">

</body>
</html>
